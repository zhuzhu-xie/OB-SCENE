<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OB-SCENE (遮蔽之景)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { width: 100%; height: 100%; }

    body {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      cursor: default;
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    .title {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title span {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #a8d8f0;
      line-height: 1.6;
    }

    .nav-links {
      display: flex;
      gap: 40px;
    }

    .nav-links a {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      padding: 12px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-links a:hover {
      color: #a8d8f0;
      border-color: rgba(168, 216, 240, 0.3);
    }

    /* ── Corner info labels ── */
    .corner {
      position: fixed;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      padding: 28px 32px;
    }

    .corner span {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #a8d8f0;
      white-space: nowrap;
      line-height: 1.6;
    }

    .top-left     { top: 0; left: 0; align-items: flex-start; }
    .top-right    { top: 0; right: 0; align-items: flex-end; text-align: right; }
    .bottom-left  { bottom: 0; left: 0; align-items: flex-start; }
    .bottom-right { bottom: 0; right: 0; align-items: flex-end; text-align: right; }
  </style>
</head>
<body>

  <div class="corner top-left">
    <span>OB-SCENE</span>
    <span>遮蔽之景</span>
  </div>
  <div class="corner top-right">
    <span>Online Exhibition</span>
    <span>Launching 26 April</span>
  </div>
  <div class="corner bottom-left">
    <span>Open Submissions</span>
    <span>All Formats Welcome</span>
  </div>
  <div class="corner bottom-right">
    <span>Ongoing Project</span>
    <span>Link To Be Released</span>
  </div>

  <div class="landing">
    <div class="title">
      <span>OB-SCENE</span>
      <span>遮蔽之景</span>
    </div>

    <nav class="nav-links">
      <a href="press.html">Press Release</a>
      <a href="warning.html">Works</a>
    </nav>
  </div>

</body>
</html>
