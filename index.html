<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OB-SCENE (遮蔽之景)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { width: 100%; height: 100%; }

    body {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      cursor: default;
      overflow: hidden;
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      position: relative;
      z-index: 1;
    }

    .logo {
      width: 280px;
      opacity: 0.85;
    }

    .nav-links {
      display: flex;
      width: 280px;
      gap: 20px;
      justify-content: center;
      margin-left: -20px;
    }

    .nav-links a {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
      text-decoration: none;
      padding: 12px 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: color 0.2s, border-color 0.2s;
    }

    .nav-links a:hover {
      color: #c0e8ff;
      border-color: rgba(192, 232, 255, 0.3);
    }

    /* ── Corner info labels ── */
    .corner {
      position: fixed;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      padding: 28px 32px;
    }

    .corner span {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #c0e8ff;
      white-space: nowrap;
      line-height: 1.6;
    }

    .top-left     { top: 0; left: 0; align-items: flex-start; }
    .top-right    { top: 0; right: 0; align-items: flex-end; text-align: right; }
    .bottom-left  { bottom: 0; left: 0; align-items: flex-start; }
    .bottom-right { bottom: 0; right: 0; align-items: flex-end; text-align: right; }

    /* ── Decorative SVG layer ── */
    .deco {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>

  <div class="corner top-left">

  <div class="landing">
    <img class="logo" src="materials/logo_white.svg" alt="OB-SCENE 遮蔽之景" />
