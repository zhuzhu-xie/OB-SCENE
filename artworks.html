<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OB-SCENE — Works</title>
  <link rel="stylesheet" href="artworks.css" />
</head>
<body>

  <div class="corner top-left">
    <span>OB-SCENE</span>
    <span>遮蔽之景</span>
  </div>
  <div class="corner top-right">
    <span>Online Exhibition</span>
    <span>Launching 26 April</span>
  </div>
  <div class="corner bottom-left">
    <span>Open Submissions</span>
    <span>All Formats Welcome</span>
  </div>
  <div class="corner bottom-right">
    <span>Ongoing Project</span>
    <span>Link To Be Released</span>
  </div>

  <div class="stage">
    <canvas id="mainCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    const COLS = 40;
    const ROWS = 24;
    const SHUFFLE_MS = 60;

    // reveal window size — kept proportional to canvas
    const REVEAL_RATIO_W = 0.45;
    const REVEAL_RATIO_H = 0.45;

    const SRCS = [
      'materials/Hito_Steyerl.jpg',
      'materials/Niklas_Roy.jpg',
      'materials/Stelarc.jpg',
      'materials/Trevor_Paglen.jpg',
      'materials/Xu_bing.jpg',
      'materials/Zach_Blas.jpg',
    ];

    let W, H, cellW, cellH, RW, RH;
    let mouseX = 0, mouseY = 0;
    let curX = 0, curY = 0;
    let scrollY = 0, targetScroll = 0;
    let lastShuffle = 0;

    // shuffle SRCS order on each load
    for (let i = SRCS.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [SRCS[i], SRCS[j]] = [SRCS[j], SRCS[i]];
    }

    const art = SRCS.map(src => ({ src, img: null, tiles: [], flat: [], ready: false }));

    let loaded = 0;
    art.forEach((a) => {
      const img = new Image();
      img.onload = () => { a.img = img; if (++loaded === art.length) init(); };
      img.src = a.src;
    });

    function resize() {
      const stage = canvas.parentElement;
      W = canvas.width  = stage.clientWidth;
      H = canvas.height = stage.clientHeight;
      cellW = Math.ceil(W / COLS);
      cellH = Math.ceil(H / ROWS);
      RW = W * REVEAL_RATIO_W;
      RH = H * REVEAL_RATIO_H;
    }

    function sliceTiles(a) {
      a.tiles     = [];
      a.greyTiles = [];
      a.flat      = [];
      for (let c = 0; c < COLS; c++) {
        a.tiles[c]     = [];
        a.greyTiles[c] = [];
        for (let r = 0; r < ROWS; r++) {
          const sx = (c / COLS) * a.img.naturalWidth;
          const sy = (r / ROWS) * a.img.naturalHeight;
          const sw = a.img.naturalWidth  / COLS;
          const sh = a.img.naturalHeight / ROWS;

          const oc = document.createElement('canvas');
          oc.width = cellW; oc.height = cellH;
          const octx = oc.getContext('2d');
          octx.drawImage(a.img, sx, sy, sw, sh, 0, 0, cellW, cellH);
          a.tiles[c][r] = oc;

          const og = document.createElement('canvas');
          og.width = cellW; og.height = cellH;
          const ogtx = og.getContext('2d');
          ogtx.filter = 'grayscale(100%) blur(3px)';
          ogtx.drawImage(a.img, sx, sy, sw, sh, 0, 0, cellW, cellH);
          a.greyTiles[c][r] = og;

          a.flat.push([c, r]);
        }
      }
      a.ready = true;
    }

    function shuffleArt(a, rl, rr, rt, rb, imgTop) {
      const hidden = [];
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS; r++) {
          const sx = c * cellW + cellW / 2;
          const sy = imgTop + r * cellH + cellH / 2;
          const inside = sx >= rl && sx <= rr && sy >= rt && sy <= rb;
          if (!inside) hidden.push([c, r]);
        }
      }
      for (let i = hidden.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [hidden[i], hidden[j]] = [hidden[j], hidden[i]];
      }
      a.flat = hidden;
    }

    function init() {
      resize();
      art.forEach(a => sliceTiles(a));
      window.addEventListener('resize', () => { resize(); art.forEach(a => sliceTiles(a)); });
      requestAnimationFrame(loop);
    }

    // mouse coords relative to canvas
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouseX = e.clientX - rect.left;
      mouseY = e.clientY - rect.top;
    });

    canvas.addEventListener('wheel', e => {
      const maxScroll = (SRCS.length - 1) * H;
      targetScroll = Math.max(0, Math.min(maxScroll, targetScroll + e.deltaY));
    });

    function loop(ts) {
      curX += (mouseX - curX) * 0.1;
      curY += (mouseY - curY) * 0.1;
      scrollY += (targetScroll - scrollY) * 0.08;

      ctx.fillStyle = '#0e0e0e';
      ctx.fillRect(0, 0, W, H);

      const rl = curX - RW / 2, rr = curX + RW / 2;
      const rt = curY - RH / 2, rb = curY + RH / 2;

      const doShuffle = ts - lastShuffle > SHUFFLE_MS;
      if (doShuffle) lastShuffle = ts;

      art.forEach((a, i) => {
        if (!a.ready) return;
        const imgTop = i * H - scrollY;
        if (imgTop > H || imgTop + H < 0) return;

        if (doShuffle) shuffleArt(a, rl, rr, rt, rb, imgTop);

        let hiddenIdx = 0;
        for (let c = 0; c < COLS; c++) {
          for (let r = 0; r < ROWS; r++) {
            const sx = c * cellW;
            const sy = imgTop + r * cellH;
            const cx = sx + cellW / 2;
            const cy = sy + cellH / 2;
            const inside = cx >= rl && cx <= rr && cy >= rt && cy <= rb;

            if (inside) {
              ctx.drawImage(a.tiles[c][r], sx, sy, cellW, cellH);
            } else {
              if (hiddenIdx < a.flat.length) {
                const [sc, sr] = a.flat[hiddenIdx++];
                ctx.drawImage(a.greyTiles[sc][sr], sx, sy, cellW, cellH);
              }
            }
          }
        }
      });

      requestAnimationFrame(loop);
    }
  </script>

</body>
</html>
